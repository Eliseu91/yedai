<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Yedai</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --primary: #3545CC;
    --primary-light: #6B94F5;
    --primary-bg: #EEF1FF;
    --surface: #F7F7FB;
    --border: #EAEAF0;
    --text: #0D0D1A;
    --muted: #8A8AA0;
    --placeholder: #C4C4D4;
    --success-text: #1B8A4A;
    --success-bg: #EAFAF0;
    --warning-text: #A56000;
    --warning-bg: #FFF7E6;
    --star: #F5A623;
  }
  html, body, #root {
    height: 100%;
  }
  body {
    margin: 0;
    background: #F0F0F0;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* page transition */
  @keyframes screenFade {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-enter {
    animation: screenFade 200ms ease-out both;
  }

  /* utility classes mapped to tokens */
  .text-muted { color: var(--muted); }
  .text-primary { color: var(--primary); }
  .bg-primary { background: var(--primary); }
  .bg-primary-bg { background: var(--primary-bg); }
  .bg-surface { background: var(--surface); }
  .border-token { border-color: var(--border); }
  .ring-token { box-shadow: 0 0 0 1px var(--border); }

  /* allow active:scale-95 to look smooth */
  button { transition: transform 120ms ease, background-color 120ms ease, border-color 120ms ease, color 120ms ease; }
  button:active { transform: scale(0.97); }

  input, textarea, button { font-family: inherit; }
  textarea { outline: none; }
  textarea:focus { border-color: var(--primary); }

  /* hide scrollbars inside shell */
  .shell-scroll { scrollbar-width: none; -ms-overflow-style: none; }
  .shell-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* dashed map path animation */
  @keyframes dashflow {
    to { stroke-dashoffset: -32; }
  }
  .map-path { animation: dashflow 1.6s linear infinite; }

  /* progress bar transition */
  .progress-fill { transition: width 600ms cubic-bezier(.2,.7,.2,1); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="mock.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens-checkout.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-tracking.jsx"></script>
<script type="text/babel" src="screens-review.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
